# Retrograde — nginx reverse proxy (Cloudflare Tunnel arkasında).
# Node standalone sunucusu :3000'de. COOP/COEP header'ları Next tarafından
# üretilir; burada strip edilmez. WASM ve range request desteği önemli.

upstream retrograde {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    # büyük disk imajları / wasm için (BYOI upload dahil)
    client_max_body_size 512M;

    # doğru MIME (bazı sürümlerde .wasm eksik olabilir)
    types {
        application/wasm wasm;
    }

    # v86/js-dos binary'leri — uzun cache, range request (async imaj streaming)
    location ~* \.(wasm|bin|img|iso|jsdos)$ {
        proxy_pass http://retrograde;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # COOP/COEP izolasyonunu koru
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    location / {
        proxy_pass http://retrograde;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
